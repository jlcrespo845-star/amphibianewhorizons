<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial, sans-serif;}
body{background:#000;color:#fff;overflow-x:hidden;}

/* Top Bar */
.topbar{
position:fixed;
top:0;
left:0;
width:100%;
padding:15px;
z-index:1000;
}
.menu-btn{
width:30px;
height:22px;
cursor:pointer;
position:relative;
}
.menu-btn span{
position:absolute;
width:100%;
height:3px;
background:#fff;
transition:0.4s;
}
.menu-btn span:nth-child(1){top:0;}
.menu-btn span:nth-child(2){top:9px;}
.menu-btn span:nth-child(3){top:18px;}

/* X animation */
.menu-btn.active span:nth-child(1){transform:rotate(45deg);top:9px;}
.menu-btn.active span:nth-child(2){opacity:0;}
.menu-btn.active span:nth-child(3){transform:rotate(-45deg);top:9px;}

/* Overlay Menu */
.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
opacity:0;
visibility:hidden;
transition:0.5s;
z-index:900;
}
.overlay.active{
opacity:1;
visibility:visible;
}
.overlay img{
width:120px;
margin-bottom:20px;
}
.overlay a{
color:#fff;
text-decoration:none;
font-size:28px;
margin:15px;
letter-spacing:2px;
cursor:pointer;
}

/* Main Page */
.main{
display:flex;
align-items:center;
justify-content:center;
height:100vh;
position:relative;
overflow:hidden;
}
.main img{
max-width:80%;
opacity:0;
transform:scale(0.8);
transition:all 1s ease;
}
.main img.show{
opacity:1;
transform:scale(0.40);
}

.footer{
position:fixed;
bottom:10px;
width:100%;
text-align:center;
color:gray;
font-size:14px;
}

/* About Page */
#about{
display:none;
padding:80px 20px;
}
.about-container{
max-width:1000px;
margin:auto;
display:flex;
flex-wrap:wrap;
align-items:center;
justify-content:center;
gap:30px;
}
.about-container img{
max-width:300px;
border-radius:10px;
opacity:0;
transform:translateY(40px);
animation:fadeUp 1s forwards;
}
.about-text{
max-width:500px;
opacity:0;
transform:translateY(40px);
animation:fadeUp 1s forwards;
animation-delay:0.3s;
}
@keyframes fadeUp{
to{opacity:1;transform:translateY(0);}
}

.heading{
color:lime;
font-size:24px;
margin-bottom:10px;
}
.info-label{color:lime;}
.info-value{color:#fff;}
